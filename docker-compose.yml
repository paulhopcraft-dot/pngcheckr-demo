services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: attestli
      POSTGRES_PASSWORD: attestli
      POSTGRES_DB: attestli
    ports:
      - "5433:5432"
    volumes:
      - attestli-pg-data:/var/lib/postgresql/data

volumes:
  attestli-pg-data:
